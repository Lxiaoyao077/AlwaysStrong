# TieJia proxy configuration
# Set your proxy address here to bypass network restrictions.
# The proxy is used by pif_native_fetch.sh and autopif.sh when fetching
# fingerprints from Google servers (developer.android.com, flashstation API, etc.).
#
# Format:
#   PROXY_HOST=127.0.0.1
#   PROXY_PORT=7890
#   PROXY_AUTH=user:pass    # optional, only needed if proxy requires auth
#
# After editing, the changes take effect on the next boot or next fingerprint refresh.

PROXY_HOST=
PROXY_PORT=
PROXY_AUTH=
