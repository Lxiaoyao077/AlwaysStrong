name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zip unzip python3

      - name: Use committed native binaries (skip the cargo-ndk step in CI)
        run: find native -path '*/prebuilt/*' -type f -exec touch {} +

      - name: Stamp version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          VC="${VER//./}"
          if echo "$VC" | grep -q '[^0-9]'; then
            echo "::error::versionCode derived from tag '$TAG' is non-numeric: '$VC'"
            echo "Tag must be a clean semver like v1.0.2. Got: $TAG"
            exit 1
          fi
          sed -i "s/^version=.*/version=${TAG}/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=${VC}/" module/module.prop
          sed -i 's/"version": ".*"/"version": "'"${TAG}"'"/' update.json
          sed -i 's/"versionCode": [0-9]*/"versionCode": '"${VC}"'/' update.json
          echo "Stamped version: ${TAG} (code: ${VC})"

      - name: Build module zip
        env:
          GITHUB_TOKEN: ${{ secrets.TEE_CI_TOKEN }}
        run: bash build.sh --tee-ci

      - name: Release notes from CHANGELOG
        run: |
          if [ -f CHANGELOG.md ]; then
            awk -v v="## ${GITHUB_REF_NAME}" '
              $0==v {f=1; next}
              /^## / {f=0}
              f {print}
            ' CHANGELOG.md > RELEASE_NOTES.md
          else
            echo "CHANGELOG.md not found — empty release notes." > RELEASE_NOTES.md
          fi
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create stable-named copy for update.json
        shell: bash
        run: cp out/AlwaysStrong-*.zip out/AlwaysStrong-latest.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            out/AlwaysStrong-*.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Commit updated version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module/module.prop update.json
          git diff --staged --quiet || git commit -m "bump to ${{ github.ref_name }} [skip ci]"
          git push
